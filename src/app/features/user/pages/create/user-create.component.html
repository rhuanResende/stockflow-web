<main class="user">

  <section class="ds-gap-md" fxLayout="column">

    <form class="ds-mt-md ds-gap-md" [formGroup]="userForm" fxLayout="column">

      @if (this.profile === 'MASTER') {
        <ds-card-base
          fxFlex
          dsTitle="Dados Empresa"
          dsIconBubbleIconConfig="fa-regular fa-building">
          <ds-select
            fxFlex
            formControlName="companyId"
            dsOptionValueProp="id"
            dsOptionLabelProp="name"
            dsLabel="Empresa"
            dsPlaceholder="Busque pela empresa"
            [dsAriaLabel]="'Empresa'"
            [dsAppendTo]="'body'"
            [dsOptionList]="companies">
          </ds-select>
        </ds-card-base>
      }

      <ds-card-base
        fxFlex
        dsTitle="Dados do usuário"
        dsIconBubbleIconConfig="fa-solid fa-user">
        <section class="ds-gap-md" fxLayout="row" fxLayoutAlign="space-between center">
          <ds-input-text
            fxFlex
            formControlName="name"
            dsLabel="Nome"
            dsPlaceholder="Nome do usuário"
            dsIconConfig="fa-regular fa-user"
            [dsIconAlign]="dsInputIconAlign.left">
          </ds-input-text>
          <ds-input-document
            fxFlex
            formControlName="document"
            dsLabel="CPF"
            dsPlaceholder="CPF do usuário"
            dsIconConfig="fa-regular fa-id-card"
            [dsIconAlign]="dsInputIconAlign.left"
            [dsType]="dsDocumentType.cpf">
          </ds-input-document>
        </section>
        <section class="ds-gap-md" fxLayout="row" fxLayoutAlign="space-between center">
          <ds-input-text
            fxFlex
            formControlName="email"
            dsLabel="E-mail"
            dsPlaceholder="E-mail do usuário"
            dsIconConfig="fa-regular fa-envelope"
            [dsIconAlign]="dsInputIconAlign.left">
          </ds-input-text>
          <ds-input-text
            fxFlex
            formControlName="phone"
            dsLabel="Celular"
            dsPlaceholder="Celular do usuário"
            dsMask="(00) 00000-0000"
            dsIconConfig="fa-solid fa-phone"
            [dsIconAlign]="dsInputIconAlign.left">
          </ds-input-text>
        </section>
      </ds-card-base>
      <ds-card-base
        fxFlex
        dsTitle="Dados do perfil"
        dsIconBubbleIconConfig="fa-solid fa-user-shield">
        <ds-select
          fxFlex
          formControlName="profileId"
          dsOptionValueProp="id"
          dsOptionLabelProp="description"
          dsLabel="Perfil"
          dsPlaceholder="Perfil do usuário"
          [dsAriaLabel]="'Perfil'"
          [dsAppendTo]="'body'"
          [dsOptionList]="profiles">
        </ds-select>
      </ds-card-base>
      <section class="ds-gap-md" fxLayout="row" fxLayoutAlign="space-between stretch">
        <section class="ds-gap-md" fxLayoutAlign="start center">
          <ds-button
            dsLabel="Voltar"
            dsIconConfig="fa-solid fa-arrow-left"
            [dsSize]="dsButtonSize.sm"
            [dsType]="dsButtonType.tertiary"
            [dsIconAlign]="dsButtonIconAlign.left"
            (dsOnClick)="goToBack()">
          </ds-button>
        </section>
        @if (!disabled) {
          <section class="ds-gap-md" fxLayoutAlign="end center">
            <ds-button
              dsLabel="Limpar"
              dsIconConfig="fa-regular fa-trash-can"
              [dsType]="dsButtonType.secondary"
              [dsIconAlign]="dsButtonIconAlign.left"
              (dsOnClick)="clean()">
            </ds-button>
            <ds-button
              dsIconConfig="fa-solid fa-plus"
              [dsLabel]="userId ? 'Editar' : 'Cadastrar'"
              [dsFullWidth]="true"
              [dsDisabled]="userForm.invalid"
              [dsIconAlign]="dsButtonIconAlign.left"
              (dsOnClick)="create()">
            </ds-button>
          </section>
        }
      </section>
    </form>
    <section fxLayout="row" fxLayoutAlign="start center">

    </section>
  </section>
</main>
