<div class="ds-not-found">
  <div class="ds-not-found__box">
    <div class="ds-not-found__code">404</div>

    <div class="ds-not-found__title">
      Página não encontrada
    </div>

    <div class="ds-not-found__description">
      Não foi possível localizar o recurso solicitado.
      Verifique o endereço informado ou retorne ao painel principal do sistema.
    </div>

    <div class="ds-not-found__actions">
      <button class="ds-button ds-button--primary" routerLink="/pages/home">
        Ir para Home
      </button>

      <button class="ds-button ds-button--secondary" onclick="history.back()">
        Voltar
      </button>
    </div>
  </div>
</div>
